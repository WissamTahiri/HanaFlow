name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

# Évite de gaspiller des minutes sur des push successifs sur la même branche
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Lint + Type-check + Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: hanaflow-next
    env:
      # Secrets factices pour que les modules qui les lisent au boot ne crashent
      # pas. Les vrais sont posés sur Vercel ; en CI on n'a besoin que de pouvoir
      # importer les fichiers.
      JWT_SECRET: ci-jwt-secret-32chars-minimum-fake
      JWT_REFRESH_SECRET: ci-refresh-secret-32chars-minimum-fake
      DATABASE_URL: postgresql://stub:stub@localhost:5432/stub
      DIRECT_URL: postgresql://stub:stub@localhost:5432/stub
      NEXT_PUBLIC_APP_URL: http://localhost:3000

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: hanaflow-next/package-lock.json

      - name: Install
        run: npm ci

      - name: Prisma generate
        run: npx prisma generate

      - name: Lint
        run: npm run lint

      - name: Type-check
        run: npx tsc --noEmit

      - name: Unit tests
        run: npm test

  e2e:
    name: Playwright e2e
    runs-on: ubuntu-latest
    # E2e n'est requis que sur PR vers master ; sur push direct sur master on
    # skippe (les unit tests + le quality check suffisent comme gate de merge)
    if: github.event_name == 'pull_request'
    defaults:
      run:
        working-directory: hanaflow-next
    env:
      JWT_SECRET: ci-jwt-secret-32chars-minimum-fake
      JWT_REFRESH_SECRET: ci-refresh-secret-32chars-minimum-fake
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/hanaflow_e2e
      DIRECT_URL: postgresql://postgres:postgres@localhost:5432/hanaflow_e2e
      NEXT_PUBLIC_APP_URL: http://localhost:3000

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: hanaflow_e2e
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: hanaflow-next/package-lock.json

      - name: Install deps
        run: npm ci

      - name: Prisma push schema
        run: npx prisma db push --skip-generate

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: pw-${{ runner.os }}-${{ hashFiles('hanaflow-next/package-lock.json') }}

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium webkit

      - name: Build
        run: npm run build

      - name: Run e2e
        run: npm run e2e
        env:
          CI: "true"

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: hanaflow-next/playwright-report
          retention-days: 7
